# DO NOT commit real values. This is a template only.
# Create the secret manually:
#   kubectl create secret generic cloudflared-secret \
#     --from-literal=TUNNEL_TOKEN="<your-cloudflare-tunnel-token>" \
#     --namespace infra
#
# Or apply this file after replacing the placeholder:
#   TUNNEL_TOKEN=$(echo -n "<token>" | base64 -w0)
#   sed "s/<BASE64_TOKEN>/$TUNNEL_TOKEN/" secret.template.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-secret
  namespace: infra
type: Opaque
data:
  TUNNEL_TOKEN: <BASE64_TOKEN>
