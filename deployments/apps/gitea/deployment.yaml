apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: apps
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:latest
          ports:
            - containerPort: 3000
            - containerPort: 22
          env:
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__database__PATH
              value: /data/gitea/gitea.db
            - name: GITEA__server__DOMAIN
              value: gitea.homelab.local
            - name: GITEA__server__ROOT_URL
              value: http://gitea.homelab.local
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__server__SSH_PORT
              value: "2222"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__packages__ENABLED
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
            - name: GITEA_ADMIN_USER
              value: admin
            - name: GITEA_ADMIN_EMAIL
              value: admin@gitea.homelab.local
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-secret
                  key: GITEA_ADMIN_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: gitea-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
