apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skyrim-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skyrim-server-config
data:
  STServer.ini: |
    [Server]
    sServerName=Thinger's Land
    sPassword=eumamoodedo
    uPort=10578
    uMaxPlayerCount=8
    bAnnounceServer=true
    [Game]
    uDifficulty=3
    bEnablePvp=true
    fGoldLossFactor=0.5
    bEnableDeathSystem=true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyrim-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skyrim
  template:
    metadata:
      labels:
        app: skyrim
    spec:
      containers:
      - name: skyrim-together
        image: tiltedphoques/st-reborn-server:weekly-latest
        tty: true
        stdin: true
        ports:
        - containerPort: 10578
          protocol: UDP
        volumeMounts:
        - name: skyrim-storage
          mountPath: /st-server/logs
          subPath: logs
        - name: skyrim-storage
          mountPath: /st-server/Data
          subPath: Data
        # Injetando o STServer.ini do ConfigMap direto na pasta de config
        - name: config-volume
          mountPath: /st-server/config/STServer.ini
          subPath: STServer.ini
        - name: timezone-config
          mountPath: /etc/localtime
          readOnly: true
        resources:
          limits:
            memory: "3Gi"
            cpu: "1.5"
          requests:
            memory: "2Gi"
            cpu: "1"
      volumes:
      - name: config-volume
        configMap:
          name: skyrim-server-config
      - name: skyrim-storage
        persistentVolumeClaim:
          claimName: skyrim-data-pvc
      - name: timezone-config
        hostPath:
          path: /etc/localtime
---
apiVersion: v1
kind: Service
metadata:
  name: skyrim-service
spec:
  type: NodePort
  selector:
    app: skyrim
  ports:
    - protocol: UDP
      port: 10578      # Porta interna
      targetPort: 10578 # Porta no container
      nodePort: 30578   # Porta fixa que você usará no roteador e no IP 192.168.15.100
