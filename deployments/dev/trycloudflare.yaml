# Quick tunnels via trycloudflare — sem conta, sem token, sem login.
# Cada Deployment gera uma URL aleatória *.trycloudflare.com no startup.
#
# USE APENAS PARA DESENVOLVIMENTO / TESTES.
# A URL muda a cada restart do pod — use infra/cloudflared/deployment.yaml (named tunnel) em produção.
#
# Cada tunnel aponta para um serviço no namespace docs.
# Para adicionar mais um site Docusaurus, copie um bloco abaixo e ajuste o nome/URL.
#
# Ver a URL gerada:
#   kubectl logs -n dev deployment/cloudflared-dev-docs-main     | grep trycloudflare.com
#   kubectl logs -n dev deployment/cloudflared-dev-docs-internal | grep trycloudflare.com
#
# Subir todos de uma vez:
#   kubectl apply -f deployments/dev/trycloudflare.yaml
#
# Derrubar todos:
#   kubectl delete -f deployments/dev/trycloudflare.yaml

# --- docs-main → namespace docs, porta 80 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-dev-docs-main
  namespace: dev
  labels:
    env: dev
    site: docs-main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-dev-docs-main
  template:
    metadata:
      labels:
        app: cloudflared-dev-docs-main
        env: dev
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args: [tunnel, --no-autoupdate, --url, "http://docs-main.docs.svc.cluster.local:80"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
