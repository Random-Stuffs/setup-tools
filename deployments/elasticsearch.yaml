apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: bitnami/elasticsearch:8.11.3
        env:
        - name: discovery.type
          value: single-node
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m" # Define o Heap do Java
        - name: ELASTICSEARCH_PASSWORD
          value: "sua_senha_aqui"
        ports:
        - containerPort: 9200
        resources:
          limits:
            memory: "1Gi" # Limite total do container no K3s
        volumeMounts:
        - name: elasticsearch-data
          mountPath: /bitnami/elasticsearch/data
      volumes:
      - name: elasticsearch-data
        persistentVolumeClaim:
          claimName: elasticsearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-service
spec:
  type: LoadBalancer
  selector:
    app: elasticsearch
  ports:
    - name: http
      protocol: TCP
      port: 9200
      targetPort: 9200

## Dica sobre Erro de "Virtual Memory Too Low"
# O Elasticsearch exige que o sistema operacional tenha um parâmetro de memória virtual
# alto (vm.max_map_count). Se o container der erro no log, execute no terminal do seu Raspberry

# sudo sysctl -w vm.max_map_count=262144
# Para tornar permanente, adicione vm.max_map_count=262144 ao arquivo /etc/sysctl.conf
