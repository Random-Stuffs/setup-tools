apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-runner
  namespace: ci
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab-runner
  template:
    metadata:
      labels:
        app: gitlab-runner
    spec:
      containers:
        - name: gitlab-runner
          image: gitlab/gitlab-runner:latest
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: runner-config
              mountPath: /etc/gitlab-runner
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: runner-config
          persistentVolumeClaim:
            claimName: gitlab-runner-config
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
