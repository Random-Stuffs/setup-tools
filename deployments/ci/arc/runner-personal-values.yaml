# Helm values for the personal (gresas) ARC runner scale-set.
# Installed by 07_arc.sh when GITHUB_PERSONAL_PAT is exported.
#
# To install manually:
#   helm upgrade --install homelab-runner \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set \
#     --version 0.13.1 \
#     --namespace ci \
#     --set githubConfigUrl="https://github.com/gresas" \
#     --set githubConfigSecret=personal-runner-secret \
#     --values deployments/ci/arc/runner-personal-values.yaml
#
# In workflows on gresas/* repos:
#   runs-on: homelab-runner

minRunners: 0
maxRunners: 2

runnerScaleSetName: homelab-runner
runnerGroup: default

template:
  spec:
    serviceAccountName: arc-runner
    containers:
    - name: runner
      volumeMounts:
      - name: docker-sock
        mountPath: /var/run/docker.sock
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 512Mi
    volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
        type: Socket
