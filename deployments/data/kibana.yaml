# Kibana connects to Elasticsearch via in-cluster DNS.
# The password here must match ELASTICSEARCH_PASSWORD in elasticsearch.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: kibana-secret
  namespace: data
type: Opaque
stringData:
  KIBANA_ELASTICSEARCH_PASSWORD: "<REPLACE_ME>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: bitnami/kibana:8.14.3
        ports:
        - containerPort: 5601
        env:
        - name: KIBANA_ELASTICSEARCH_URL
          value: "http://elasticsearch.data.svc.cluster.local:9200"
        - name: KIBANA_ELASTICSEARCH_USER
          value: "elastic"
        - name: KIBANA_ELASTICSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kibana-secret
              key: KIBANA_ELASTICSEARCH_PASSWORD
        startupProbe:
          httpGet:
            path: /api/status
            port: 5601
          failureThreshold: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: data
spec:
  type: LoadBalancer
  selector:
    app: kibana
  ports:
  - port: 5601
    targetPort: 5601
