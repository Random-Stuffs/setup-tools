# Generic CI/CD template for deploying a containerised app to the homelab k3s cluster.
#
# Copy this file to .github/workflows/deploy.yaml in any application repo.
# No edits needed — everything is derived from git context and GitHub variables.
#
# Prerequisites in the app repo:
#   - Dockerfile at the repo root.
#   - .k8s/ directory with deployment.yaml, service.yaml, ingress.yaml,
#     trycloudflare.yaml (use deployments/templates/docusaurus/ as reference).
#   - GitHub variable DEPLOY_NAMESPACE set in Settings → Variables → Actions.
#
# Runtime variables (resolved by the workflow):
#   APP_NAME  — github.event.repository.name  (e.g. carlos-geo-hub)
#   NAMESPACE — vars.DEPLOY_NAMESPACE          (e.g. docs)
#   IMAGE     — <repo-name>:<git-sha>           (local image, imported into k3s containerd)

name: Build and Deploy

on:
  push:
    branches: ["master", "main"]

jobs:
  build-and-deploy:
    runs-on: org-runner

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build and import image into k3s
        run: |
          IMAGE="${{ github.event.repository.name }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker save "$IMAGE" | sudo k3s ctr images import -

      - name: Install kubectl
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          KUBECTL_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
          curl -sLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl

      - name: Apply k8s manifests
        run: |
          export APP_NAME="${{ github.event.repository.name }}"
          export NAMESPACE="${{ vars.DEPLOY_NAMESPACE }}"
          export IMAGE="${{ github.event.repository.name }}:${{ github.sha }}"
          for f in .k8s/*.yaml; do
            envsubst < "$f" | kubectl apply -f -
          done

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ github.event.repository.name }} \
            --namespace=${{ vars.DEPLOY_NAMESPACE }} \
            --timeout=120s

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
