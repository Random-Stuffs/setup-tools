# Template CI/CD para apps no homelab k3s.
#
# Copie para .gitea/workflows/deploy.yml no repo da aplicação.
# Ajuste apenas PORT se necessário (padrão 8080 para Go, 80 para nginx).
#
# Pré-requisitos no repo da aplicação:
#   - Dockerfile na raiz
#   - .k8s/ com deployment.yaml, service.yaml, ingress.yaml
#   - .k8s/cloudflare-tunnel.yaml  (de templates/app/cloudflare-tunnel.yaml)
#   - .k8s/trycloudflare.yaml      (de templates/app/trycloudflare.yaml)
#   - Gitea variable DEPLOY_NAMESPACE (ex: apps, docs)
#
# Triggers:
#   - push master/main + tags v*  → deploy automático com túnel nomeado (prd)
#   - workflow_dispatch            → redeploy manual em qualquer branch
#     (em develop: ephemeral no dev namespace via trycloudflare)
#
# Variáveis resolvidas pelo workflow:
#   APP_NAME  — <repo-name>                   (master) | <repo-name>-ephemeral (develop)
#   NAMESPACE — vars.DEPLOY_NAMESPACE         (master) | dev                   (develop)
#   IMAGE     — <repo-name>:<git-sha>
#   PORT      — porta do serviço (ajuste conforme o app)
#
# Secret necessário em prd para o túnel nomeado:
#   kubectl create secret generic cloudflare-tunnel-<APP_NAME> \
#     --from-literal=token="<cloudflare-tunnel-token>" -n prd

name: Build and Deploy

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do redeploy (ex: novo conteúdo, hotfix)"
        required: false
        default: "redeploy manual"

jobs:
  build-and-deploy:
    runs-on: [homelab]

    env:
      IMAGE: "${{ github.event.repository.name }}:${{ github.sha }}"
      APP_NAME: ${{ github.ref_name == 'develop' && format('{0}-ephemeral', github.event.repository.name) || github.event.repository.name }}
      NAMESPACE: ${{ github.ref_name == 'develop' && 'dev' || vars.DEPLOY_NAMESPACE }}
      PORT: "8080"   # ajuste conforme o app (80 para nginx, 8080 para Go, 3000 para Node)
      NERDCTL_VERSION: "2.0.4"

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SERVER=$(echo "${{ github.server_url }}" | sed 's|://|://x-token-auth:'"${GITHUB_TOKEN}"'@|')
          git clone --depth 1 --branch "${{ github.ref_name }}" \
            "${SERVER}/${{ github.repository }}.git" .

      - name: Setup nerdctl
        run: |
          if ! command -v nerdctl &>/dev/null || ! command -v buildctl &>/dev/null || ! command -v runc &>/dev/null; then
            ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
            wget -qO /tmp/nerdctl.tar.gz \
              "https://github.com/containerd/nerdctl/releases/download/v${NERDCTL_VERSION}/nerdctl-full-${NERDCTL_VERSION}-linux-${ARCH}.tar.gz"
            tar -C /usr/local -xzf /tmp/nerdctl.tar.gz bin/nerdctl bin/buildkitd bin/buildctl bin/runc
            rm /tmp/nerdctl.tar.gz
          fi

      - name: Build image
        run: |
          pkill -x buildkitd 2>/dev/null || true
          rm -f /run/buildkit/buildkitd.sock
          mkdir -p /run/buildkit
          buildkitd \
            --addr unix:///run/buildkit/buildkitd.sock \
            --oci-worker=true \
            --containerd-worker=false \
            --root /data/buildkit > /tmp/buildkitd.log 2>&1 &
          for i in $(seq 1 30); do
            buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers &>/dev/null && break
            sleep 1
          done
          buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers &>/dev/null \
            || { echo "buildkitd falhou ao iniciar:"; cat /tmp/buildkitd.log; exit 1; }
          BUILDKIT_HOST=unix:///run/buildkit/buildkitd.sock \
          nerdctl \
            --address /run/k3s/containerd/containerd.sock \
            --namespace k8s.io \
            build \
            --cache-from type=local,src=/data/buildcache \
            --cache-to   type=local,dest=/data/buildcache,mode=max \
            -t "${IMAGE}" . 2>&1 | tee /tmp/build.log | tail -30 \
          || { echo "=== Build falhou. Log completo:"; cat /tmp/build.log; exit 1; }

      - name: Apply k8s manifests
        run: |
          TMPKUBE=$(mktemp)
          sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc.cluster.local|g' \
            /etc/rancher/k3s/k3s.yaml > "$TMPKUBE"
          for f in .k8s/*.yaml; do
            name=$(basename "$f")
            case "$name" in
              cloudflare-tunnel.yaml|trycloudflare.yaml) continue ;;
            esac
            sed \
              -e "s|\${APP_NAME}|${APP_NAME}|g" \
              -e "s|\${IMAGE}|${IMAGE}|g" \
              -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
              "$f" | KUBECONFIG="$TMPKUBE" k3s kubectl apply -f -
          done
          rm -f "$TMPKUBE"

      - name: Deploy production tunnel
        if: github.ref_name == 'master' || github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
        run: |
          TMPKUBE=$(mktemp)
          sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc.cluster.local|g' \
            /etc/rancher/k3s/k3s.yaml > "$TMPKUBE"
          sed \
            -e "s|\${APP_NAME}|${APP_NAME}|g" \
            -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
            .k8s/cloudflare-tunnel.yaml | KUBECONFIG="$TMPKUBE" k3s kubectl apply -f -
          rm -f "$TMPKUBE"

      - name: Deploy trycloudflare
        if: github.ref_name == 'develop'
        run: |
          TMPKUBE=$(mktemp)
          sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc.cluster.local|g' \
            /etc/rancher/k3s/k3s.yaml > "$TMPKUBE"
          sed \
            -e "s|\${APP_NAME}|${APP_NAME}|g" \
            -e "s|\${NAMESPACE}|${NAMESPACE}|g" \
            -e "s|\${PORT}|${PORT}|g" \
            .k8s/trycloudflare.yaml | KUBECONFIG="$TMPKUBE" k3s kubectl apply -f -
          rm -f "$TMPKUBE"

      - name: Wait for rollout
        run: |
          TMPKUBE=$(mktemp)
          sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc.cluster.local|g' \
            /etc/rancher/k3s/k3s.yaml > "$TMPKUBE"
          KUBECONFIG="$TMPKUBE" k3s kubectl rollout status deployment/"${APP_NAME}" \
            --namespace="${NAMESPACE}" \
            --timeout=120s
          rm -f "$TMPKUBE"

      - name: Show tunnel URL
        if: github.ref_name == 'develop'
        run: |
          TMPKUBE=$(mktemp)
          sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc.cluster.local|g' \
            /etc/rancher/k3s/k3s.yaml > "$TMPKUBE"
          echo "Aguardando tunnel iniciar..."
          URL=""
          for i in $(seq 1 20); do
            URL=$(KUBECONFIG="$TMPKUBE" k3s kubectl logs -n dev \
              "deployment/cloudflared-dev-${APP_NAME}" 2>/dev/null \
              | grep -o 'https://[^ ]*trycloudflare\.com' | tail -1)
            [ -n "$URL" ] && break
            sleep 3
          done
          rm -f "$TMPKUBE"
          echo "=== URL do tunnel ==="
          echo "${URL:-URL ainda não disponível — verifique os logs do pod cloudflared-dev-${APP_NAME}}"

      - name: Prune dangling images
        if: always()
        run: |
          BUILDKIT_HOST=unix:///run/buildkit/buildkitd.sock \
          nerdctl \
            --address /run/k3s/containerd/containerd.sock \
            --namespace k8s.io \
            image prune -f
